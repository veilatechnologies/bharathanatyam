<svg width="200" height="400" viewBox="0 0 200 400" xmlns="http://www.w3.org/2000/svg">
  <g stroke="#2d241f" stroke-width="2" fill="none" stroke-linecap="round" stroke-linejoin="round">
    
    <!-- Kolam Pattern 1 -->
    <g transform="translate(100, 100)">
      <path d="M 0 -40 L 40 0 L 0 40 L -40 0 Z" />
      <path d="M 0 -60 C 20 -60, 40 -80, 40 -100 C 40 -80, 60 -60, 80 -60 C 60 -60, 40 -40, 40 -20 C 40 -40, 20 -40, 0 -40" opacity="0.5"/>
      <path d="M 0 60 C 20 60, 40 80, 40 100 C 40 80, 60 60, 80 60 C 60 60, 40 40, 40 20 C 40 40, 20 40, 0 40" opacity="0.5"/>
      <circle cx="0" cy="0" r="15" />
      <circle cx="0" cy="0" r="5" fill="#2d241f" />
      <!-- Dots -->
      <circle cx="20" cy="20" r="2" fill="#2d241f" />
      <circle cx="-20" cy="20" r="2" fill="#2d241f" />
      <circle cx="20" cy="-20" r="2" fill="#2d241f" />
      <circle cx="-20" cy="-20" r="2" fill="#2d241f" />
      <circle cx="0" cy="-50" r="2" fill="#2d241f" />
      <circle cx="0" cy="50" r="2" fill="#2d241f" />
      <circle cx="-50" cy="0" r="2" fill="#2d241f" />
      <circle cx="50" cy="0" r="2" fill="#2d241f" />
      
      <!-- Loops -->
      <path d="M -30 -30 Q 0 -60 30 -30 Q 60 0 30 30 Q 0 60 -30 30 Q -60 0 -30 -30" />
    </g>

    <!-- Small spacer mandala -->
    <g transform="translate(100, 260) scale(0.6)">
      <circle cx="0" cy="0" r="30" stroke-dasharray="5 5" />
      <circle cx="0" cy="0" r="10" fill="#2d241f" />
      <path d="M 0 -40 L 10 -15 L 40 0 L 10 15 L 0 40 L -10 15 L -40 0 L -10 -15 Z" />
    </g>
    
  </g>
</svg>
